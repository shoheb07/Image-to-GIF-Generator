<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image to GIF Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>GIF Generator from Images</h1>

  <input type="file" id="imageUpload" multiple accept="image/*">
  
  <label>Frame Delay (ms):</label>
  <input type="number" id="delay" value="500" min="100">

  <button id="generateBtn">Generate GIF</button>
  <button id="downloadBtn" disabled>Download GIF</button>

  <div id="preview"></div>
</div>

<!-- GIF.js CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
<script src="script.js"></script>

</body>
</html>
